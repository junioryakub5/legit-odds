# ─── LEGIT ODDS — Nginx config ──────────────────────────────────────────────────
# Node backend runs on port 5007
# Nginx listens on port 8181 and proxies to Node
# Vercel rewrites /api/* → http://72.60.23.133:8181/api/*

server {
    listen 8181;
    server_name 72.60.23.133;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    # Proxy all /api traffic to the Node backend (port 5007)
    location /api {
        proxy_pass         http://127.0.0.1:5007;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Large body for image uploads
        client_max_body_size 20M;
    }

    # Health check shortcut
    location /health {
        proxy_pass http://127.0.0.1:5007/api/health;
    }
}
