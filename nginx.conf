# ─── LEGIT ODDS — Nginx config ──────────────────────────────────────────────────
# Runs on port 8181 (separate from other projects)
# Vercel rewrites /api/* → http://YOUR_VPS_IP:8181/api/*
# IMPORTANT: Replace YOUR_VPS_IP with your actual VPS IP address.

server {
    listen 8181;
    server_name YOUR_VPS_IP;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    # Proxy all /api traffic to the Node backend (port 8181)
    location /api {
        proxy_pass         http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Paystack webhook needs larger body
        client_max_body_size 10M;
    }

    # Health check shortcut
    location /health {
        proxy_pass http://127.0.0.1:8181/api/health;
    }
}
